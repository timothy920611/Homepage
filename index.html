<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JW 個人儀表板</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --primary-color: #4a6da7;
            --text-color: #333;
            --secondary-text: #666;
            --jw-purple: #4a2c68;
            --accent-blue: #007bff;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        .dashboard-header h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 主容器佈局 */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 左右各半 */
            gap: 24px;
            flex: 1;
            min-height: 0; /* 防止溢出 */
        }

        /* 左側與右側都設為 Flex 並且內容可捲動 */
        .column-left, .column-right {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            height: 100%; /* 填滿高度 */
            overflow: hidden; /* 內部捲動 */
        }

        .panel h2 {
            margin-top: 0;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            font-size: 1.2rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0; /* 標題不縮放 */
        }

        /* 每日經文特定樣式 */
        #daily-text-content {
            line-height: 1.8;
            font-size: 1.1rem;
            flex: 1;
            overflow-y: auto; /* 內容過長時捲動 */
        }
        #daily-text-content header { font-weight: 600; font-size: 1.1em; margin-bottom: 12px; color: #555; }
        #daily-text-content .themeScrp { font-size: 1.3em; font-weight: 700; margin-bottom: 20px; display: block; color: var(--jw-purple); line-height: 1.4; }
        #daily-text-content .bodyTxt { color: #444; margin-bottom: 15px; }
        #daily-text-content .sb { font-size: 0.9em; color: #888; margin-top: 15px; display: block; font-style: italic; }
        #daily-text-content .imgGrid, #daily-text-content figure { display: none; }
        #daily-text-content a { pointer-events: none; text-decoration: none; color: inherit; }

        /* 最新資料列表樣式 (含圖片) */
        .whats-new-list {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr; /* 單欄列表 */
            gap: 16px;
        }

        .news-item {
            display: flex;
            gap: 15px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
            align-items: start;
        }
        .news-item:hover {
            background-color: #f8f9fa;
        }
        .news-item:last-child {
            border-bottom: none;
        }

        /* 圖片容器 */
        .news-thumb {
            width: 120px;
            height: 68px; /* 16:9 比例 */
            background-color: #eee;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .news-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 文字內容 */
        .news-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .news-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            text-decoration: none;
            line-height: 1.4;
            margin-bottom: 4px;
            /* 限制顯示兩行 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-title:hover {
            color: var(--accent-blue);
        }
        .news-meta {
            font-size: 0.8rem;
            color: #888;
        }

        /* 狀態樣式 */
        .loading { color: #999; display: flex; align-items: center; justify-content: center; height: 100%; gap: 10px; }
        .fallback-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px; background: #f8f9fa; border-radius: 12px; margin-top: 10px; flex: 1; border: 1px dashed #ccc;
        }
        .fallback-btn {
            margin-top: 15px; padding: 12px 24px; background-color: var(--primary-color); color: white;
            text-decoration: none; border-radius: 8px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px;
        }

        @media (max-width: 900px) {
            body { height: auto; padding: 16px; }
            .container { grid-template-columns: 1fr; gap: 20px; }
            .panel { min-height: 400px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1><i class="ph ph-house-line"></i> 我的屬靈儀表板</h1>
    </div>

    <div class="container">
        <!-- 左半部：每日經文 -->
        <div class="column-left">
            <div class="panel">
                <h2><i class="ph ph-book-open-text"></i> 每日經文</h2>
                <div id="daily-text-content">
                    <div class="loading">
                        <i class="ph ph-spinner ph-spin"></i> 正在連線到 WOL...
                    </div>
                </div>
            </div>
        </div>

        <!-- 右半部：最新資料 (合併顯示) -->
        <div class="column-right">
            <div class="panel">
                <h2><i class="ph ph-sparkle"></i> 最新資料 (圖片與連結)</h2>
                <div id="whats-new-list" class="whats-new-list">
                    <div class="loading">
                        <i class="ph ph-spinner ph-spin"></i> 正在抓取最新資料...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 設定網址
        const URLS = {
            dailyTextHub: 'https://wol.jw.org/cmn-Hant/wol/h/r24/lp-ch', 
            whatsNew: 'https://www.jw.org/cmn-hant/%E6%96%B0%E8%B3%87%E6%96%99/' // 新資料頁面
        };

        // 代理服務
        const PROXY = 'https://api.codetabs.com/v1/proxy?quest=';

        function showFallback(elementId, title, url, msg) {
            const el = document.getElementById(elementId);
            el.innerHTML = `
                <div class="fallback-box">
                    <i class="ph ph-warning-circle" style="font-size: 2em; color: #999;"></i>
                    <p style="margin: 10px 0; font-weight: bold;">${msg}</p>
                    <a href="${url}" target="_blank" class="fallback-btn">
                        <i class="ph ph-arrow-square-out"></i> 前往 ${title}
                    </a>
                </div>
            `;
        }

        // 1. 載入每日經文
        async function loadDailyText() {
            const container = document.getElementById('daily-text-content');
            try {
                const targetUrl = URLS.dailyTextHub + '?t=' + Math.random();
                const response = await fetch(PROXY + encodeURIComponent(targetUrl));
                if (!response.ok) throw new Error('Proxy Network Error');
                
                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                let content = doc.querySelector('.daily-text') || doc.querySelector('#dailyText') || doc.querySelector('.todayItem');

                if (content) {
                    content.querySelectorAll('a').forEach(a => a.removeAttribute('href'));
                    content.querySelectorAll('img').forEach(img => img.remove());
                    container.innerHTML = content.innerHTML;
                } else {
                    throw new Error('找不到經文區塊');
                }
            } catch (error) {
                console.error('DailyText Fail:', error);
                showFallback('daily-text-content', '今日經文', URLS.dailyTextHub, '無法自動載入內容');
            }
        }

        // 2. 載入最新資料 (包含圖片)
        async function loadWhatsNew() {
            const container = document.getElementById('whats-new-list');
            try {
                const targetUrl = URLS.whatsNew;
                const response = await fetch(PROXY + encodeURIComponent(targetUrl));
                if (!response.ok) throw new Error('Network Error');
                
                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');

                // 嘗試抓取 JW 列表項目 (常見 class 為 synopsis 或 item)
                // 注意：JW 頁面結構可能會變，這裡抓取常見結構
                const items = doc.querySelectorAll('.synopsis, .publicationCard, .result-item, .card');
                
                if (items.length === 0) throw new Error('No items found');

                container.innerHTML = ''; // 清空 loading

                let count = 0;
                items.forEach(item => {
                    if (count >= 10) return; // 只顯示前 10 筆

                    // 抓取標題與連結
                    const linkEl = item.querySelector('h3 a') || item.querySelector('a');
                    if (!linkEl) return;

                    const title = linkEl.innerText.trim();
                    let link = linkEl.getAttribute('href');
                    // 修正相對路徑
                    if (link && !link.startsWith('http')) {
                        link = 'https://www.jw.org' + link;
                    }

                    // 抓取圖片
                    let imgUrl = '';
                    const imgEl = item.querySelector('img');
                    if (imgEl) {
                        // 優先抓 data-src (延遲載入)，如果沒有則抓 src
                        let rawSrc = imgEl.getAttribute('data-src') || imgEl.getAttribute('src');
                        if (rawSrc) {
                            if (rawSrc.startsWith('//')) {
                                imgUrl = 'https:' + rawSrc;
                            } else if (rawSrc.startsWith('/')) {
                                imgUrl = 'https://www.jw.org' + rawSrc;
                            } else {
                                imgUrl = rawSrc;
                            }
                        }
                    }

                    // 預設圖片 (如果抓不到)
                    if (!imgUrl) {
                        imgUrl = 'https://assetsnffrgf-a.akamaihd.net/assets/m/assets/img/jw-org-share.jpg'; // 通用預設圖
                    }

                    // 建立 HTML 元素
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <div class="news-thumb">
                            <img src="${imgUrl}" alt="thumbnail" onerror="this.src='https://via.placeholder.com/120x68?text=JW'">
                        </div>
                        <div class="news-content">
                            <a href="${link}" target="_blank" class="news-title">${title}</a>
                        </div>
                    `;
                    container.appendChild(div);
                    count++;
                });

            } catch (error) {
                console.error('WhatsNew Fail:', error);
                container.innerHTML = `
                    <div style="text-align:center; padding:20px; color:#666;">
                        <p>載入失敗，可能是防護機制阻擋。</p>
                        <a href="${URLS.whatsNew}" target="_blank" class="fallback-btn">前往 JW.org 最新資料</a>
                    </div>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadDailyText();
            loadWhatsNew();
        });

    </script>
</body>
</html>
